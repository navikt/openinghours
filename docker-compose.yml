version: "3.9"
services:
  postgres:
    image: postgres:17
    container_name: openinghours-postgres
    environment:
      POSTGRES_DB: openinghours
      POSTGRES_USER: openinghours
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openinghours -d openinghours"]
      interval: 5s
      timeout: 3s
      retries: 5
  app:
    build: .
    container_name: openinghours
    depends_on:
      postgres:
        condition: service_healthy
    env_file: #only for local development
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openinghours
      SPRING_DATASOURCE_USERNAME: openinghours
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8081:8081"