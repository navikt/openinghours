spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
flyway:
  enabled: true
  locations: classpath:db/migration

api:
  security:
    enabled: false
    key: test-api-key
    header-name: X-API-Key

jira:
  url: http://localhost
  username: test
  password: test

openinghours:
  api:
    url: http://localhost/
    token: test-token
  client:
    id: test-client-id
    secret: test-client-secret
